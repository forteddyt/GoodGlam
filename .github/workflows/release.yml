name: Release

# Run title shown in the Actions UI. run-name is evaluated once when the run is created - before any
# job runs - so it can only use dispatch-time context (github/inputs). The exact stable X.Y.Z is
# computed later inside the stable job (compute-version.ps1), so it can't appear here; the chosen
# bump component (patch/minor/major) is the closest deterministic label. Push runs cut the rolling
# testing build, which has no bump input.
run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('Release stable ({0} bump)', inputs.bump)
      || 'Release testing (auto)' }}

# Two distribution channels served by one custom-repo URL (repo.json on gh-pages):
#
#   * testing - published automatically on every push to main. Lands in the repo.json TESTING channel,
#               so it only reaches users who enable "Get plugin testing builds" in Dalamud. Backed by
#               a single rolling "testing" prerelease. Also re-published right after a stable release
#               (see below) so the testing channel never trails stable.
#   * stable - cut manually by a maintainer (workflow_dispatch). Lands in the STABLE channel, seen by
#            everyone. Backed by a permanent vX.Y.Z release marked --latest.
#
# On a workflow_dispatch (stable) run, the testing job runs AFTER stable (needs: stable) so it
# recomputes the rolling testing version off the freshly-cut stable base (X.Y.Z.<run>) and republishes
# the TESTING channel in the same run. This keeps the "testing is always just ahead of stable"
# invariant: without it, a stable release would leave the testing channel advertising the previous,
# now-lower testing number
# until the next push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Stable version bump"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

# Serialize all writes to the gh-pages branch (this workflow's repo.json publish and ci.yml's
# coverage publish on main push/schedule runs). Keyed by ref so PR CI isn't affected; the
# shared group name (matched in ci.yml) also keeps two releases on the same ref from racing.
concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Testing channel: publish the rolling testing build.
  #   * On push to main: runs directly (stable is skipped).
  #   * On workflow_dispatch: runs AFTER the stable job (needs: stable) so it recomputes the testing version
  #     off the freshly-cut stable base and republishes the TESTING channel in the same run, keeping
  #     testing >= stable. Sequencing via needs also serializes this job's repo.json publish after
  #     stable's, so they don't race the shared gh-pages concurrency group.
  # ---------------------------------------------------------------------------
  testing:
    name: Testing channel (auto)
    needs: [stable]
    # !cancelled() lets this run even though stable is skipped on a push. On push the first branch is
    # true and testing runs immediately (it does not wait on the skipped stable job). On workflow_dispatch
    # testing runs whenever stable actually ran (result != 'skipped') - including a stable FAILURE after the
    # stable release was created: testing's own repo.json publish then regenerates BOTH channels from the
    # live releases, self-healing a flaky stable publish so testing never trails stable.
    if: >-
      !cancelled() &&
      (github.event_name == 'push' || needs.stable.result != 'skipped')
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute testing version
        id: ver
        shell: pwsh
        # On a successful workflow_dispatch, stable has just created the --latest stable release; use
        # its computed X.Y.Z directly (needs.stable.outputs.version) so the testing base doesn't depend on
        # releases/latest API propagation. On push (stable skipped) or a stable failure, no -StableBase is
        # passed and the script reads whatever stable release actually exists - never a base that
        # wasn't released.
        run: >-
          ./scripts/compute-version.ps1 -Channel testing -RunNumber ${{ github.run_number }}
          ${{ needs.stable.result == 'success' && format('-StableBase {0}', needs.stable.outputs.version) || '' }}

      - name: Build & package plugin (Release)
        id: build
        uses: ./.github/actions/build-plugin
        with:
          version: ${{ steps.ver.outputs.version }}

      - name: Update rolling testing prerelease
        shell: pwsh
        run: |
          # Recreate the single "testing" release so its tag tracks the latest main commit and its assets
          # are the freshly built ones. --cleanup-tag also removes the old git tag. The delete is
          # wrapped so the first-ever run (no testing release yet) doesn't abort the step - a non-zero gh
          # exit is a terminating error when the runner enables native-command error handling.
          try {
            gh release delete testing --repo "${{ github.repository }}" --yes --cleanup-tag 2>$null
          } catch {
            Write-Host "No existing testing release to delete (first run?)."
          }
          gh release create testing `
            "${{ steps.build.outputs.zip-path }}" `
            "${{ steps.build.outputs.manifest-path }}" `
            --repo "${{ github.repository }}" `
            --target "${{ github.sha }}" `
            --prerelease `
            --title "Testing channel (rolling)" `
            --notes "Rolling testing build ${{ steps.ver.outputs.version }} from the latest main commit. Enable 'Get plugin testing builds' in Dalamud to receive it."

      - name: Publish repo.json
        uses: ./.github/actions/publish-repo-json
        with:
          manifest-path: ${{ steps.build.outputs.manifest-path }}
          github-token: ${{ github.token }}

  # ---------------------------------------------------------------------------
  # Stable channel: maintainer-triggered stable release.
  # The "release" environment gates this run (add required reviewers in repo settings for a hard,
  # owner-only approval on top of the write-access that workflow_dispatch already requires).
  # ---------------------------------------------------------------------------
  stable:
    name: Stable channel (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write
    # Exposed so the testing job can adopt this exact stable base deterministically (see its compute step)
    # instead of re-reading releases/latest.
    outputs:
      version: ${{ steps.ver.outputs.version }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute stable version
        id: ver
        # Auto-computes the next X.Y.Z from the latest stable tag and the chosen bump, with strict
        # monotonic + SemVer-format + tag-collision guards. Fails the run rather than regressing.
        shell: pwsh
        run: ./scripts/compute-version.ps1 -Channel stable -Bump ${{ inputs.bump }}

      - name: Build & package plugin (Release)
        id: build
        uses: ./.github/actions/build-plugin
        with:
          version: ${{ steps.ver.outputs.version }}

      - name: Create stable release
        shell: pwsh
        run: |
          # Creates the permanent git tag ${{ steps.ver.outputs.tag }} at this commit and marks it the
          # --latest release (so releases/latest/download/latest.zip resolves to it).
          gh release create "${{ steps.ver.outputs.tag }}" `
            "${{ steps.build.outputs.zip-path }}" `
            "${{ steps.build.outputs.manifest-path }}" `
            --repo "${{ github.repository }}" `
            --target "${{ github.sha }}" `
            --latest `
            --title "${{ steps.ver.outputs.tag }}" `
            --generate-notes

      - name: Publish repo.json
        uses: ./.github/actions/publish-repo-json
        with:
          manifest-path: ${{ steps.build.outputs.manifest-path }}
          github-token: ${{ github.token }}
