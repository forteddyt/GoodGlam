name: CI

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:

jobs:
  build-test:
    name: Build & test
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      # The Dalamud.NET.Sdk resolves the dev libraries from DALAMUD_HOME (falling back to the
      # XIVLauncher dev-hooks path, which doesn't exist on CI). Point it at the restored .dalamud/.
      DALAMUD_HOME: ${{ github.workspace }}\.dalamud

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore Dalamud dev libraries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .dalamud | Out-Null
          curl.exe -L -o .dalamud/latest.zip https://goatcorp.github.io/dalamud-distrib/latest.zip
          Expand-Archive -Path .dalamud/latest.zip -DestinationPath .dalamud -Force

      - name: Restore
        run: dotnet restore GoodGlam.slnx

      - name: Build
        run: dotnet build GoodGlam.slnx -c Release --no-restore

      - name: Verify plugin package (manifest + latest.zip)
        # The Release build runs DalamudPackager, which emits the manifest and latest.zip.
        # Assert both exist and that the zip is clean (no Dalamud/game-provided assemblies).
        shell: pwsh
        run: |
          $manifest = "src/GoodGlam/bin/Release/GoodGlam/GoodGlam.json"
          $zip      = "src/GoodGlam/bin/Release/GoodGlam/latest.zip"
          if (-not (Test-Path $manifest)) { throw "Expected manifest not found: $manifest" }
          if (-not (Test-Path $zip))      { throw "Expected package not found: $zip" }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zip))
          try { $entries = $archive.Entries.FullName } finally { $archive.Dispose() }

          # Only GoodGlam's own assembly may ship in the zip. Everything Dalamud and the game
          # provide is referenced with Private=false and must never be bundled, so flag any other
          # .dll as a leak. This stays correct as the SDK's reference set changes, without tracking
          # it here.
          $strayDlls = $entries |
            Where-Object { $_ -like "*.dll" -and (Split-Path $_ -Leaf) -ne "GoodGlam.dll" }
          if ($strayDlls) { throw "Package contains unexpected assemblies that should not be bundled: $($strayDlls -join ', ')" }

          Write-Host "Package OK. Manifest present and zip contains: $($entries -join ', ')"

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: goodglam
          path: |
            src/GoodGlam/bin/Release/GoodGlam/latest.zip
            src/GoodGlam/bin/Release/GoodGlam/GoodGlam.json

      - name: Test (unit)
        run: dotnet test tests/GoodGlam.Tests/GoodGlam.Tests.csproj -c Release --no-build --settings coverlet.runsettings --results-directory TestResults

      - name: Test (integration, live Eorzea Collection)
        # End-to-end tests that drive the real EC client. Blocking: a sustained EC outage fails
        # the build (they retry to absorb transient blips). Coverage lands in the same TestResults
        # dir so the lines they exercise feed the merged report below.
        run: dotnet test tests/GoodGlam.IntegrationTests/GoodGlam.IntegrationTests.csproj -c Release --no-build --settings coverlet.runsettings --results-directory TestResults

      - name: Coverage report
        if: always()
        shell: pwsh
        env:
          DOTNET_ROLL_FORWARD: Major
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:TestResults/**/coverage.cobertura.xml -targetdir:CoverageReport -assemblyfilters:+GoodGlam -reporttypes:"Html;Badges;MarkdownSummaryGithub"
          Get-Content CoverageReport/SummaryGithub.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport

      - name: Comment coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: CoverageReport/SummaryGithub.md

      - name: Publish report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: CoverageReport
