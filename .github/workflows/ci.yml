name: CI

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:

# Serialize gh-pages writes with release.yml (both publish to gh-pages on push->main). The group
# name and key match release.yml so a main-branch CI run and a release run can't push concurrently;
# PR runs get a distinct group (their ref) and are unaffected.
concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  script-tests:
    name: Script tests (Pester)
    # Run on both OSes: release.yml runs these scripts on windows-latest, and the exit-code behavior
    # they guard depends on the runner's pwsh - so the tests must cover the production OS too.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester tests for the release scripts
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
          Import-Module Pester
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/scripts'
          $config.Run.Throw = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  build-test:
    name: Build & test
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & package plugin (Release)
        id: build
        uses: ./.github/actions/build-plugin

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: goodglam
          path: |
            ${{ steps.build.outputs.zip-path }}
            ${{ steps.build.outputs.manifest-path }}

      - name: Test (unit)
        run: dotnet test tests/GoodGlam.Tests/GoodGlam.Tests.csproj -c Release --no-build --settings coverlet.runsettings --results-directory TestResults

      - name: Test (integration, live Eorzea Collection)
        # End-to-end tests that drive the real EC client. Blocking: a sustained EC outage fails
        # the build (they retry to absorb transient blips). Coverage lands in the same TestResults
        # dir so the lines they exercise feed the merged report below.
        run: dotnet test tests/GoodGlam.IntegrationTests/GoodGlam.IntegrationTests.csproj -c Release --no-build --settings coverlet.runsettings --results-directory TestResults

      - name: Coverage report
        if: always()
        shell: pwsh
        env:
          DOTNET_ROLL_FORWARD: Major
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:TestResults/**/coverage.cobertura.xml -targetdir:CoverageReport -assemblyfilters:+GoodGlam -reporttypes:"Html;Badges;MarkdownSummaryGithub"
          Get-Content CoverageReport/SummaryGithub.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport

      - name: Comment coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: CoverageReport/SummaryGithub.md

      - name: Publish report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: CoverageReport
          # gh-pages also hosts the plugin repository JSON (repo.json), published by release.yml.
          # keep_files stops this coverage publish from wiping repo.json off the branch.
          keep_files: true
