name: CI

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:

jobs:
  build-test:
    name: Build & test
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & package plugin (Release)
        id: build
        uses: ./.github/actions/build-plugin

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: goodglam
          path: |
            ${{ steps.build.outputs.zip-path }}
            ${{ steps.build.outputs.manifest-path }}

      - name: Test (unit)
        run: dotnet test tests/GoodGlam.Tests/GoodGlam.Tests.csproj -c Release --no-build --settings coverlet.runsettings --results-directory TestResults

      - name: Test (integration, live Eorzea Collection)
        # End-to-end tests that drive the real EC client. Blocking: a sustained EC outage fails
        # the build (they retry to absorb transient blips). Coverage lands in the same TestResults
        # dir so the lines they exercise feed the merged report below.
        run: dotnet test tests/GoodGlam.IntegrationTests/GoodGlam.IntegrationTests.csproj -c Release --no-build --settings coverlet.runsettings --results-directory TestResults

      - name: Coverage report
        if: always()
        shell: pwsh
        env:
          DOTNET_ROLL_FORWARD: Major
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:TestResults/**/coverage.cobertura.xml -targetdir:CoverageReport -assemblyfilters:+GoodGlam -reporttypes:"Html;Badges;MarkdownSummaryGithub"
          Get-Content CoverageReport/SummaryGithub.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport

      - name: Comment coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: CoverageReport/SummaryGithub.md

      - name: Publish report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: CoverageReport
          # gh-pages also hosts the plugin repository JSON (repo.json), published by release.yml.
          # keep_files stops this coverage publish from wiping repo.json off the branch.
          keep_files: true
